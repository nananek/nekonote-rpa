name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Sync version from tag
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          cd frontend
          npm version $version --no-git-tag-version
        shell: pwsh

      # ── Backend ──
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e .
          pip install pyinstaller playwright
          python -m playwright install chromium

      - name: Build backend with PyInstaller
        run: |
          cd backend
          python build.py

      # ── Frontend ──
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npx electron-vite build

      - name: Package and publish
        run: |
          cd frontend
          npx electron-builder --win --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # electron-builder publishes the NSIS installer, portable ZIP, and
      # latest.yml (for auto-update) to the GitHub Release.
