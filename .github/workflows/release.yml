name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # ── Backend ──
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e .
          pip install pyinstaller playwright
          python -m playwright install chromium

      - name: Build backend with PyInstaller
        run: |
          cd backend
          python build.py

      # ── Frontend ──
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npx electron-vite build

      - name: Package and publish installer
        run: |
          cd frontend
          npx electron-builder --win --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # electron-builder publishes the installer AND latest.yml (for auto-update)
      # to the GitHub Release. No separate upload step needed.
