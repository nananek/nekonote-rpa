name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-and-check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[automation,data,uitree,mcp,dev]"

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: nekonote CLI smoke test
        run: |
          cd backend
          python -m nekonote.cli --help
          python -m nekonote.cli list-actions

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          cd backend
          pip-audit

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Audit npm dependencies
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit || true

      - name: Frontend build check
        run: |
          cd frontend
          npx electron-vite build

  # ── Build installer (master push only) ──
  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: lint-and-check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      # ── Backend ──
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[automation]"
          pip install pyinstaller playwright
          python -m playwright install chromium

      - name: Build backend with PyInstaller
        run: |
          cd backend
          python build.py

      # ── Frontend ──
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npx electron-vite build

      - name: Package installer
        run: |
          cd frontend
          npx electron-builder --win --config electron-builder.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload ──
      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nekonote-installer
          path: frontend/release/*.exe
          retention-days: 30

      - name: Upload portable artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nekonote-portable
          path: frontend/release/*.zip
          retention-days: 30
          if-no-files-found: ignore
